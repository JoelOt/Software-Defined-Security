# =============================================================================
# Snort 2.x Configuration for Federated SDN Quarantine VNF
# Architecture: Data Plane (Security VNF)
#
# This is the Snort 2 equivalent of snort.lua for team members running
# Snort <=2.x. It provides a minimal configuration to load local.rules
# and output alerts in fast format.
# =============================================================================

# Network variables (using 'any' since this is a quarantine honeypot)
var HOME_NET any
var EXTERNAL_NET any

# Load local rules
include local.rules

# Event filtering: rate-limit alert output (1 alert per source IP per 10 seconds)
event_filter gen_id 1, sig_id 1000001, type limit, track by_src, count 1, seconds 10

# Output: fast alerts to the log directory (specified via -l flag)
output alert_fast: alert_fast.txt
